apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresher
  namespace: cicd-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-refresher
  namespace: cicd-platform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresher
  namespace: cicd-platform
subjects:
  - kind: ServiceAccount
    name: ecr-refresher
    namespace: cicd-platform
roleRef:
  kind: Role
  name: ecr-refresher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-secret-refresher
  namespace: cicd-platform
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-refresher
          containers:
            - name: ecr-refresher
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  apt-get install -y awscli 2>/dev/null || apk add --no-cache aws-cli 2>/dev/null || true
                  TOKEN=$(aws ecr get-login-password --region ap-south-1)
                  kubectl create secret docker-registry ecr-secret \
                    --docker-server=522814728042.dkr.ecr.ap-south-1.amazonaws.com \
                    --docker-username=AWS \
                    --docker-password=$TOKEN \
                    --namespace=cicd-platform \
                    --dry-run=client -o yaml | kubectl apply -f -
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: secret-access-key
                - name: AWS_DEFAULT_REGION
                  value: ap-south-1
          restartPolicy: OnFailure